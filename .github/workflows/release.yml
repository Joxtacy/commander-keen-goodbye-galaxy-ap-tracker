name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 0.1.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update manifest.json version
        run: |
          jq --arg v "${{ inputs.version }}" '.package_version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit manifest bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet manifest.json; then
            echo "manifest.json already at version ${{ inputs.version }}, skipping commit"
          else
            git add manifest.json
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          ZIP_NAME="keen_goodbye_galaxy_ap_tracker_${{ inputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            versions.json \
            items/ \
            locations/ \
            layouts/ \
            maps/ \
            images/ \
            scripts/
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
          files: ${{ env.ZIP_NAME }}
